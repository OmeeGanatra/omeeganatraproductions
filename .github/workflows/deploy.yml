name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_API_REPO: ogp/api
  ECR_WEB_REPO: ogp/web
  ECS_CLUSTER: ogp-production

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  build-api:
    name: Build & Push API Image
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push API image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f apps/server/Dockerfile \
            -t $ECR_REGISTRY/$ECR_API_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_API_REPO:latest \
            .
          docker push $ECR_REGISTRY/$ECR_API_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_API_REPO:latest
          echo "image=$ECR_REGISTRY/$ECR_API_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

  build-web:
    name: Build & Push Web Image
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Web image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_CLOUDFRONT_URL=${{ secrets.NEXT_PUBLIC_CLOUDFRONT_URL }} \
            -t $ECR_REGISTRY/$ECR_WEB_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_WEB_REPO:latest \
            .
          docker push $ECR_REGISTRY/$ECR_WEB_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_WEB_REPO:latest
          echo "image=$ECR_REGISTRY/$ECR_WEB_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

  migrate:
    name: Run Database Migrations
    needs: [build-api]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @ogp/db exec prisma migrate deploy

  deploy:
    name: Deploy to ECS
    needs: [build-api, build-web, migrate]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update API service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service ogp-api \
            --force-new-deployment \
            --no-cli-pager

      - name: Update Worker service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service ogp-worker \
            --force-new-deployment \
            --no-cli-pager

      - name: Update Web service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service ogp-web \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait for API service stability
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services ogp-api \
            --no-cli-pager

      - name: Wait for Web service stability
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services ogp-web \
            --no-cli-pager
