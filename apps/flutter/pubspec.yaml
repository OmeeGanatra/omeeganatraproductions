name: ogp
description: Omee Ganatra Productions — Client Portal & Admin Panel
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # HTTP
  dio: ^5.4.3
  http: ^1.2.1

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Image / Video
  cached_network_image: ^3.3.1
  photo_view: ^0.15.0
  video_player: ^2.9.1
  chewie: ^1.8.5

  # File handling
  file_picker: ^8.1.2
  path_provider: ^2.1.3

  # Share / links
  share_plus: ^10.0.0
  app_links: ^6.1.0
  url_launcher: ^6.3.0

  # Firebase — full native stack
  firebase_core: ^3.3.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.1

  # Local DB (mobile only — guarded with kIsWeb)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  data_table_2: ^2.5.12

  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
